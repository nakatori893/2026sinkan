<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>抽選結果</title>

<style>
body {
  background:#000;
  color:#fff;
  text-align:center;
  font-family:sans-serif;
}

/* 🎆 花火 */
#fireworks {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
  pointer-events:none;
}

/* 前面 */
body > *:not(canvas) {
  position:relative;
  z-index:1;
}

/* カード */
.card {
  background:#111;
  margin:15px auto;
  padding:15px;
  border-radius:10px;
  max-width:400px;
  opacity:0;
  transition:0.5s;
}
.card.show { opacity:1; }

.name {
  font-size:20px;
  font-weight:bold;
  margin:5px 0;
}

/* 特賞カード */
.special-card {
  background:#f5d96b;
  color:#000;
}

/* 特賞演出 */
.special-overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.special-title {
  font-size:34px;
  margin-bottom:20px;
}

.special-name {
  font-size:46px;
  margin:10px 0;
  opacity:0;
  transition:0.4s;
}

.ultra {
  font-size:70px;
  transform:scale(0.6);
  transition:0.6s;
  font-weight:bold;
}

.ultra.show {
  transform:scale(1.3);
}

.special-title,
.special-name,
.ultra {
  text-shadow: 0 0 10px #000, 0 0 20px #000;
}
</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<h1>🎁 抽選結果 🎁</h1>
<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwSBTzWWRlBUNYkub5z2PQDaO0GInPwW3YDq0bgLL2WVJOrgcCgCGcb4u1evftcVDkH/exec";

let isPublic = false;
let fireworkMode = "normal";

/* 順番 */
const prizeOrder = [
  "①JCBギフトカード　10枠",
  "②kumori ヨガマット　1枠",
  "③GP HITSTER　1枠",
  "④Francfranc ハンディファン　1枠",
  "⑤Anker モバイルバッテリー　1枠",
  "⑥クイックルワイパー スターターセット　1枠",
  "⑦ドウシシャ 電動かき氷機　1枠",
  "⑧uFit Performance Pole　1枠",
  "⑨Levoit 空気清浄機　1枠",
  "⑩冷酒徳利セット　1枠",
  "⑪T-fal フライパンセット　1枠",
  "⑫Panasonic スチームアイロン　1枠"
];

function wait(ms){
  return new Promise(r=>setTimeout(r,ms));
}

function scrollToBottom(){
  window.scrollTo({
    top:document.body.scrollHeight,
    behavior:"smooth"
  });
}

/* ✅ 公開チェック */
async function checkPublic(){

  let res = await fetch(API_URL + "?type=public");
  let data = await res.json();

  if(!data.isPublic){

    document.body.innerHTML = `
      <div style="text-align:center;margin-top:100px;">
        <h1>結果はまだ公開されていません</h1>
      </div>
    `;

    isPublic = false;
    throw new Error("非公開");
  }

  isPublic = true;
}

/* ✅ 起動 */
async function start(){

  try {
    await checkPublic();

    if(!isPublic) return;

    await loadResult();

  } catch(e){
    console.log("非公開中で停止");
  }

}

start();

/* ✅ 表示 */
async function loadResult(){

  if(!isPublic) return;

  let res = await fetch(API_URL + "?type=result");
  let data = await res.json();

  let grouped = {};

  data.forEach((r,i)=>{
    if(i===0 && r[0]==="prize") return;
    if(!grouped[r[0]]) grouped[r[0]]=[];
    grouped[r[0]].push(r[1]);
  });

  let el = document.getElementById("result");

  for(let prize of prizeOrder){

    if(!isPublic) return;

    if(!grouped[prize]) continue;

    let isSpecial = prizeOrder.indexOf(prize)>=9;

    if(isSpecial){
      await showSpecial(prize, grouped[prize]);
    }

    let div = document.createElement("div");
    div.className = isSpecial ? "card special-card":"card";

    let html = `<b>${prize}</b><br>`;

    grouped[prize].forEach(name=>{
      html += `<div class="name">${name} 氏</div>`;
    });

    div.innerHTML = html;
    el.appendChild(div);

    scrollToBottom();

    await wait(100);
    div.classList.add("show");

    await wait(2000);
  }

  startFinale();
}

/* ✅ 特賞 */
async function showSpecial(prize, names){

  if(!isPublic) return;

  fireworkMode = "special";

  let overlay = document.createElement("div");
  overlay.className = "special-overlay";

  overlay.innerHTML = `
    <div class="special-title">${prize}</div>
    <div id="specialBox"></div>
    <div id="ultraBox"></div>
  `;

  document.body.appendChild(overlay);

  let box = document.getElementById("specialBox");
  let last = names[names.length - 1];

  for(let i=0;i<names.length-1;i++){

    if(!isPublic) return;

    let div = document.createElement("div");
    div.className = "special-name";
    div.textContent = names[i] + " 氏";

    box.appendChild(div);

    await wait(200);
    div.style.opacity = 1;

    await wait(2000);
  }

  let ultraBox = document.getElementById("ultraBox");

  ultraBox.innerHTML = `
    <div class="ultra">${last} 氏</div>
    <div style="font-size:24px;margin-top:20px;">🎉 おめでとう！ 🎉</div>
  `;

  let ultra = ultraBox.querySelector(".ultra");

  await wait(200);
  ultra.classList.add("show");

  await wait(4500);

  overlay.remove();

  fireworkMode = "color";
}

/* 🎆 花火 */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

let particles=[];
let hue=0;

function createFirework(count=50){

  let x=Math.random()*canvas.width;
  let y=Math.random()*canvas.height*0.6;

  for(let i=0;i<count;i++){
    particles.push({
      x,y,
      hue:hue+Math.random()*30,
      angle:Math.random()*Math.PI*2,
      speed:Math.random()*3+2,
      life:60
    });
  }

  hue+=10;
}

function update(){

  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=Math.cos(p.angle)*p.speed;
    p.y+=Math.sin(p.angle)*p.speed;
    p.life--;
  });

  particles=particles.filter(p=>p.life>0);

  particles.forEach(p=>{
    ctx.globalAlpha=p.life/60;
    ctx.fillStyle=`hsl(${p.hue},100%,60%)`;
    ctx.fillRect(p.x,p.y,3,3);
  });
}

function loop(){

  let prob=fireworkMode==="special"?0.15:0.05;

  if(Math.random()<prob){
    createFirework();
  }

  update();
  requestAnimationFrame(loop);
}

loop();

/* 🔥 フィナーレ */
function startFinale(){

  if(!isPublic) return;

  fireworkMode="finale";

  let count=0;

  let interval=setInterval(()=>{
    createFirework(150);

    count++;
    if(count>30){
      clearInterval(interval);
    }
  },150);
}

</script>

</body>
</html>
