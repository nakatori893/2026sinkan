<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票システム</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: sans-serif;
  margin: 0;
  padding: 10px;
  max-width: 500px;
  margin: auto;
  background: linear-gradient(180deg, #fff8dc, #ffe4e1);
}

.title {
  font-size: 24px;
  text-align: center;
  font-weight: bold;
  margin-bottom: 15px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.row span {
  flex: 1;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

.row input {
  width: 60px;
  margin-left: 10px;
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  background: #ff7f50;
  color: white;
  font-weight: bold;
}

.special {
  color: #ffcc00;
  font-weight: bold;
  text-shadow: 1px 1px 2px black;
}
</style>
</head>

<body>

<div class="title">🎉 大抽選イベント 🎉</div>

<div class="card">
  <input id="name" placeholder="名前">

  <div id="votes"></div>

  <p>残り: <span id="remain">3</span></p>

  <button onclick="vote()">🎁 投票する</button>
</div>

<div class="card" id="adminArea" style="display:none;">
  <h3>管理者</h3>

  <button onclick="loadData()">データ取得</button>
  <div id="voteList"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyQrOYRdsIeBUjrKbfEQSJL-isSlDM0MVvyS7GBNX87JjnuhH2poBYZrYkcfX4hm1Vc/exec";

// 景品
const prizes = [
  { key:"A", name:"JCBギフトカード" },
  { key:"B", name:"クモリ ヨガマット" },
  { key:"C", name:"GP HITSTER" },
  { key:"D", name:"Francfranc ハンディファン" },
  { key:"E", name:"Anker モバイルバッテリー" },
  { key:"F", name:"クイックルワイパー スターターセット" },
  { key:"G", name:"ドウシシャ 電動かき氷機" },
  { key:"H", name:"uFit Performance Pole" },
  { key:"I", name:"Levoit 空気清浄機" },
  { key:"J", name:"冷酒徳利セット" },
  { key:"K", name:"T-fal フライパンセット" },
  { key:"L", name:"Panasonic スチームアイロン" }
];

let allData = [];

// UI生成
const voteDiv = document.getElementById("votes");

prizes.forEach(p=>{
  voteDiv.innerHTML += `
  <div class="row">
    <span class="${["J","K","L"].includes(p.key) ? "special" : ""}">
      ${p.name}
    </span>
    <input type="number" min="0" max="3" value="0" id="v_${p.key}">
  </div>`;
});

// 残り票
function updateRemain(){
 let total=0;
 prizes.forEach(p=>{
  total+=parseInt(document.getElementById("v_"+p.key).value)||0;
 });
 document.getElementById("remain").innerText=3-total;
}
prizes.forEach(p=>{
 document.getElementById("v_"+p.key).addEventListener("input",updateRemain);
});

// 投票（重複防止）
function vote(){

 const name=document.getElementById("name").value.trim();
 if(!name) return alert("名前入力");

 fetch(API_URL,{
  method:"POST",
  body:JSON.stringify({type:"check",name})
 })
 .then(r=>r.json())
 .then(res=>{
  if(res.exists){
   if(!confirm("上書きしますか？")) return;
   submitVote(name,"update");
  }else{
   submitVote(name,"new");
  }
 });
}

// 投票送信
function submitVote(name,type){

 let vote={name,type};

 prizes.forEach(p=>{
  vote[p.key]=parseInt(document.getElementById("v_"+p.key).value)||0;
 });

 fetch(API_URL,{
  method:"POST",
  body:JSON.stringify(vote)
 }).then(()=> alert("完了"));
}

// 管理画面（10回タップ）
let tapCount=0;
document.body.addEventListener("click",()=>{
 tapCount++;
 if(tapCount>=10){
  let pass=prompt("管理者パスワード");
  if(pass==="admin123"){
    document.getElementById("adminArea").style.display="block";
  }
  tapCount=0;
 }
});

// データ取得
function loadData(){
 fetch(API_URL)
 .then(r=>r.json())
 .then(data=>{
  data.shift();
  allData=data;

  let html="<h4>一覧</h4>";

  prizes.forEach((p,i)=>{
    html+=`<b>${p.name}</b><br>`;
    allData.forEach(row=>{
      let val=row[i+1];
      if(val>0){
        html+=`${row[0]}(${val})
        <button onclick="deletePrize('${row[0]}','${p.key}')">削除</button><br>`;
      }
    });
    html+="<br>";
  });

  document.getElementById("voteList").innerHTML=html;
 });
}

// 景品削除
function deletePrize(name,prize){

 if(!confirm("削除しますか？")) return;

 fetch(API_URL,{
  method:"POST",
  body:JSON.stringify({type:"deletePrize",name,prize})
 }).then(()=>{
  loadData();
 });
}

updateRemain();

</script>

</body>
</html>
